<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Экран Кухни — Столовая</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="workerstyle.css">
</head>
<body>

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" preload="auto"></audio>

    <div class="worker-app">
        
        <header class="worker-header">
            <div class="header-info">
                <h2>👨‍🍳 Панель Кухни</h2>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 4px;">
                    <p id="clock" style="margin: 0;">00:00:00</p>
                    <button id="clear-shift-btn" style="background: #323238; color: #f75a68; border: 1px solid #f75a68; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; position: relative; z-index: 999;">Закрыть смену</button>
                </div>
            </div>
            <span class="status-indicator online">В сети</span>
        </header>

        <nav class="worker-tabs">
            <button class="tab-btn active" id="tab-active">Активные (<span id="active-count">0</span>)</button>
            <button class="tab-btn" id="tab-archive">Выданные / Архив</button>
        </nav>

        <main class="orders-container" id="orders-list">
        </main>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

    <script src="workerscript.js"></script>
</body>
</html>
